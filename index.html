<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto integrador Modulo 1 Nicole Ospina</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <h1>GENERADOR DE PALETAS</h1>
    </header>
    <main>
        <section class="controls">
            <h2>Controles</h2>
            <label for="size">Tamaño de la paleta:</label>
            <select id="size">
                <option value="6">6</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
            <button id="generate">Generar paleta</button>
        </section>
        <section class="palette-section">
            <h2>Paleta</h2>
            <div id="palette">
                <div class="color-box">#FF5733</div>

            </div>
        </section>
    </main>
</body>
</html>
